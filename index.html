<script>
    const biographyData = [
        {
            year: 1630,
            title: "The Birth at Shivneri",
            details: "Shivaji was born to Jijabai and Shahaji Bhonsle at the hill fort of Shivneri, near Junnar. His birth occurred during a period of extreme geopolitical flux as the Nizam Shahi dynasty of Ahmadnagar neared its end. His father, Shahaji Raje, was a powerful military commander often sought by both the Deccan Sultanates and the Mughals for his exceptional cavalry leadership and strategic brilliance.",
            extended: "Jijabai, a woman of immense fortitude and the daughter of Lakhuji Jadhavrao, prayed to Goddess Shivai for a son who would liberate the land. The fort of Shivneri was chosen for its impregnability against the looming threats of the Bijapur Sultanate and the Mughals. This year marks the beginning of a lineage that would fundamentally challenge the concept of absolute monarchies in India.",

            source: "Primary Source: Jedhe Shakavali; Bakhar of Shivneri."

        {

            details: "During Shivaji's first year, the Deccan was ravaged by the 'Mahadurga' or the Great Famine of 1630-32. This catastrophic event led to the death of millions and social collapse across the Sahyadri ranges. Shahaji was constantly on the move, engaging in complex military maneuvers to protect his family and his Jagir (landholdings).",

            analysis: "Strategic Impact: The famine necessitated a highly efficient and decentralized administrative model, which Shivaji would later implement to ensure food security in his kingdom.",
            source: "Reference: 'The Rise of the Maratha Power' by M.G. Ranade."

        {

            extended: "Shahaji's resistance was so formidable that he became a major target for the Mughal Emperor. This year saw the shift of power dynamics as the Nizam Shahi kingdom neared its final dissolution. Shivaji's mother ensured his safety while the political map of the Deccan was being redrawn through blood and iron.",
            analysis: "Tactical Observation: Shivaji witnessed the power of hill forts (Gadhs) over open plains, a lesson that would become the cornerstone of his future military strategy.",

        {
            year: 1633,

            extended: "The Mughals and the Adil Shah of Bijapur joined forces to crush Shahaji. This forced the family into deep forest hideouts. Shivaji's early exposure to the Mavala people—the local hillmen—began during these nomadic months. He began to understand their unparalleled knowledge of the mountain passes and hidden trails.",
            analysis: "Political Strategy: This was the first major 'rebellion' against imperial authority that Shivaji witnessed, teaching him that small, mobile forces could challenge empires.",
            source: "Reference: G.S. Sardesai, 'New History of the Marathas'."
        },
        {
            year: 1634,
            title: "The Battle of Parenda",
            details: "Shahaji Raje successfully defended the fort of Parenda against a massive Mughal assault. This victory cemented his reputation as the premier general of the Deccan. Shivaji was now four years old, observing the arrival of messengers, the preparation of war councils, and the logistics of fort defense.",
            extended: "The psychological impact of his father's defiance against the Mughal Emperor Shah Jahan cannot be overstated. While other Maratha chieftains were content with vassalage, Shahaji’s struggle for a local sovereign identity—even through a puppet king—was a precursor to Shivaji’s later concept of Swarajya.",

            source: "Reference: 'History of Aurangzib' by Jadunath Sarkar."
        },
        {
            year: 1635,

            extended: "As a result of the peace treaty, Shahaji was forced to give up his claims in Northern Maharashtra and moved toward the Bijapur service in the South (Bangalore). Shivaji and his mother were to move to Pune, the family's ancestral Jagir, which at the time was a desolate ruins due to the 'curse' of earlier wars.",

            extended: "Among the administrators was Dadoji Konddeo, a man of strict discipline and judicial expertise. He was tasked with reviving the Pune Jagir. Shivaji began his formal education in the Sahyadri valleys, learning not just from books, but from the land and its people.",
            analysis: "Administrative Foundation: The 'Kasba Pune' began to be rebuilt, and the first seeds of a structured revenue and judicial system were planted.",
            source: "Reference: 'Shivaji: Hindu King in Islamic India' by James Laine."
        },
        {
            year: 1637,

            details: "The Pune region was a wasteland, reportedly cursed by a donkey-plough in previous conflicts. To break the superstition and restore confidence, Dadoji Konddeo famously used a golden plough to cultivate the land. Shivaji, at age seven, witnessed this symbolic act of restoration.",
            extended: "He observed the return of farmers to their lands and the establishment of local law and order. Jijabai, his primary educator, used these years to imbue him with a sense of historical pride, recounting the stories of the ancient Hindu kings who ruled with justice.",

        {

            extended: "Shivaji spent his days exploring the Mavals—the surrounding valleys. He befriended the local 'Mavala' youths, cutting across caste and social hierarchies. These friends, like Yesaji Kank and Tanaji Malusare, would later become his most trusted generals.",

            source: "Reference: 'Shivacharitra Sahitya' (Archives)."

        {

            extended: "He learned the intricacies of the 'Watandar' system—local feudal lords who often exploited the peasantry. Shivaji observed the need for a central authority that could bypass these middle-men to provide direct justice to the 'Rayat' (farmers).",

        {

            extended: "Despite the growing social stature, Shivaji's focus remained on the suffering of the local people under foreign rule. His mother, Jijabai, continued to act as his spiritual and political compass, reinforcing the idea that his life was meant for a higher purpose than just being a Jagirdar (fief-holder).",
            analysis: "Diplomatic Status: The alliance with the Nimbalkars provided Shivaji with legitimacy among the often-fractious Maratha aristocracy.",
            source: "Reference: 'Maratha Kshatriyancha Itihas'."
        },
        {
            year: 1641,
            title: "Journey to Bangalore",
            details: "Shivaji and Jijabai traveled to Bangalore to visit Shahaji Raje, who was now a key general in the Bijapur Sultanate's southern campaigns. This visit was transformative, as it exposed the 11-year-old Shivaji to a different style of governance and military organization.",
            extended: "In Bangalore, he witnessed the opulence of the southern courts but was also struck by the contrast between the local culture and the ruling elite. He observed the 'Nayak' administrative systems of the South, which were remnants of the Vijayanagara Empire. These impressions remained with him when he returned to Pune.",
            analysis: "Civilizational Awareness: The encounter with the remnants of the Vijayanagara culture likely influenced his later efforts to revive Sanskrit and Hindu administrative terms.",
            source: "Reference: 'Shivabharat' by Paramanand (Contemporary Sanskrit Poem)."
        },
        {
            year: 1642,
            title: "The Vision of Swarajya",
            details: "Returning to Pune from Bangalore, Shivaji was no longer a child but a young man with a vision. He began to question the legality and morality of serving foreign Sultans. He started gathering a small, dedicated group of Mavala friends to discuss the idea of 'Hindavi Swarajya'.",
            extended: "The geopolitical climate was tense. The Adil Shah of Bijapur was busy with southern expansions, leaving a slight opening in the administration of the Sahyadris. Shivaji used this 'blind spot' to begin his grassroots organization in the 12 Mavals (valleys) surrounding Pune.",
            analysis: "Ideological Seed: 1642 is often cited by historians as the year when the 'mental blueprint' of an independent Maratha state was finalized.",
            source: "Reference: 'The Marathas' by Stewart Gordon."
        },
        {

        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${item.year} - ${item.title}`;
        select.appendChild(option);
    });

    function jumpTo(val) {
        currentPage = parseInt(val);
        renderPage();
    }

    function renderPage() {
        const data = biographyData[currentPage] || biographyData[0];
        const container = document.getElementById('pageData');
        
        container.innerHTML = `
            <div class="animate-page flex flex-col h-full">
                <div class="flex flex-col md:flex-row md:items-center gap-6 mb-8">
                    <div class="year-badge text-white font-bold w-20 h-20 shrink-0 rounded-2xl flex items-center justify-center text-2xl serif shadow-lg">
                        ${data.year}
                    </div>
                    <div>
                        <h2 class="text-3xl md:text-5xl font-bold serif text-white tracking-tight leading-tight">${data.title}</h2>
                        <div class="h-1 w-12 bg-amber-500 mt-3 rounded-full"></div>
                    </div>
                </div>

                <div class="flex-grow space-y-6">
                    <p class="text-slate-200 text-xl leading-relaxed serif font-semibold">
                        ${data.details}
                    </p>
                    
                    <p class="text-slate-400 text-lg leading-relaxed italic">
                        ${data.extended || "Extended research for this specific year is ongoing in the national archives."}
                    </p>

                    <div class="analysis-box">
                        <h4 class="text-amber-500 text-xs font-bold uppercase tracking-widest mb-2">Strategic Analysis</h4>
                        <p class="text-slate-300 text-sm italic">
                            ${data.analysis || "Geopolitical shifts during this period forced a tactical re-evaluation of Maratha fort defenses."}
                        </p>
                    </div>
                </div>

                <div class="mt-12 space-y-6">
                    <a href="https://www.google.com/search?q=Shivaji+Maharaj+${data.year}+${data.title.replace(/ /g, '+')}" target="_blank" class="group inline-flex items-center gap-3 text-amber-500 hover:text-amber-400 font-bold text-sm tracking-widest transition-all">
                        <span class="bg-amber-500/10 p-2 rounded-lg group-hover:bg-amber-500/20">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        </span>
                        RESEARCH VISUALS & MAPS
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="translate-x-0 group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </a>

                    <div class="source-tag pt-6 italic flex items-center gap-3 text-[11px]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                        ${data.source}
                    </div>
                </div>
            </div>
        `;

        document.getElementById('progressBar').style.width = `${((currentPage + 1) / biographyData.length) * 100}%`;
        document.getElementById('pageCounter').innerText = `Archive ${String(currentPage + 1).padStart(2, '0')} / ${biographyData.length}`;
        document.getElementById('yearMarker').innerText = `${data.year} A.D.`;
        document.getElementById('jumpToYear').value = currentPage;
        
        document.getElementById('prevBtn').disabled = currentPage === 0;
        document.getElementById('nextBtn').disabled = currentPage === (biographyData.length - 1);

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextPage() {
        if (currentPage < biographyData.length - 1) {
            currentPage++;
            renderPage();
        }
    }

    function prevPage() {
        if (currentPage > 0) {
            currentPage--;
            renderPage();
        }
    }

    window.onload = () => {
        renderPage();
    };
</script>

</body>
</html>
