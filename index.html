<script>
    const biographyData = [
        {

            title: "The Dawn of Conflict",
            details: "The early 17th century in the Deccan was defined by the decaying Nizam Shahi dynasty of Ahmadnagar and the aggressive southward expansion of the Mughal Empire under Shah Jahan. The region was a mosaic of warring Sultanates—Bijapur, Golconda, and Ahmadnagar—who frequently employed Maratha chieftains as mercenary commanders.",
            extended: "Shivaji’s father, Shahaji Raje Bhonsle, was a high-ranking military commander whose loyalty was coveted by all. His mother, Jijabai, was the daughter of Lakhuji Jadhavrao of Sindkhed, a powerful nobleman. The marriage unified two prestigious Maratha houses, but the era was marred by treachery; Jijabai’s father and brothers were murdered in the Nizam Shahi court, fueling her desire for a sovereign Hindu state (Swarajya) free from Sultanate politics.",
            analysis: "The 'Bargi' warfare system (light cavalry) perfected by Shahaji Raje laid the tactical foundation for his son. This period of political instability forced Maratha families to choose between being vassals to foreign Sultans or carving out their own destiny. Shivaji was the answer to this historical dilemma.",

        {

            analysis: "The choice of a hill fort for birth was strategic, protecting the newborn from the raids of local rivals and ensuring the safety of the Bhonsle lineage during an era of assassination and treachery.",

        },

            analysis: "The devastation of this famine likely informed Shivaji's later agricultural policies, which included state-sponsored irrigation and fair taxation to protect the peasantry from such shocks.",

        },
        {

    let currentPage = 0;

    const select = document.getElementById('jumpToYear');
    biographyData.forEach((item, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = item.year === "Prologue" ? "Prologue: Background" : `${item.year} - ${item.title}`;
        select.appendChild(option);
    });

    function jumpTo(val) {
        currentPage = parseInt(val);
        renderPage();
    }

    function renderPage() {
        const data = biographyData[currentPage];
        const container = document.getElementById('pageData');
        
        container.innerHTML = `
            <div class="animate-page flex flex-col h-full">
                <div class="flex flex-col md:flex-row md:items-center gap-6 mb-10">
                    <div class="year-badge text-white font-bold w-24 h-24 shrink-0 rounded-[2rem] flex items-center justify-center text-xl md:text-2xl serif shadow-2xl border border-amber-400/30 text-center px-2">
                        ${data.year}
                    </div>
                    <div>
                        <h2 class="text-4xl md:text-6xl font-bold serif text-white tracking-tight leading-tight">${data.title}</h2>
                        <div class="h-1.5 w-16 bg-amber-500 mt-4 rounded-full shadow-lg shadow-amber-500/50"></div>
                    </div>
                </div>

                <div class="space-y-8 flex-grow">
                    <section>
                        <h3 class="text-amber-500/80 text-xs font-black uppercase tracking-[0.2em] mb-3">Historical Context</h3>
                        <p class="text-slate-100 text-2xl leading-relaxed serif font-medium">
                            ${data.details}
                        </p>
                    </section>
                    
                    <section>
                        <h3 class="text-amber-500/80 text-xs font-black uppercase tracking-[0.2em] mb-3">Extended Narrative</h3>
                        <p class="text-slate-400 text-xl leading-relaxed italic serif">
                            ${data.extended}
                        </p>
                    </section>

                    <div class="analysis-box">
                        <h3 class="text-amber-500 text-xs font-black uppercase tracking-[0.2em] mb-3">Strategic Insight</h3>
                        <p class="text-slate-300 text-base leading-relaxed">
                            ${data.analysis}
                        </p>
                    </div>
                </div>

                <div class="mt-16 pt-8 border-t border-white/5 space-y-6">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                        <a href="https://www.google.com/search?q=Shivaji+Maharaj+history+${data.year}" target="_blank" class="group flex items-center gap-3 text-amber-500 font-bold text-xs tracking-widest">
                            EXPLORE EXTERNAL ARCHIVES
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </a>
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            ${data.source}
                        </span>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('progressBar').style.width = `${((currentPage + 1) / biographyData.length) * 100}%`;
        document.getElementById('pageCounter').innerText = `Archive ${String(currentPage + 1).padStart(2, '0')} / ${biographyData.length}`;
        document.getElementById('yearMarker').innerText = data.year === "Prologue" ? "Prologue" : `${data.year} A.D.`;
        document.getElementById('jumpToYear').value = currentPage;
        
        document.getElementById('prevBtn').disabled = currentPage === 0;
        document.getElementById('nextBtn').disabled = currentPage === (biographyData.length - 1);

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextPage() {
        if (currentPage < (biographyData.length - 1)) {
            currentPage++;
            renderPage();
        }
    }

    function prevPage() {
        if (currentPage > 0) {
            currentPage--;
            renderPage();
        }
    }

    window.onload = () => {
        renderPage();
    };
</script>
